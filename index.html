<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio - Circular Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
  <main class="page">
    <h1 class="sr-only">Portfolio</h1>

    <section class="stage">
      <div id="circularGallery" class="circular-gallery" aria-label="Circular project gallery"></div>
    </section>

    <div class="controls">
      <button id="viewAllBtn" class="btn">View All</button>
      <button id="themeToggle" class="btn">Toggle Theme</button>
    </div>
  </main>

  <div class="details-modal" id="detailsModal" aria-hidden="true">
    <div class="details-content">
      <div class="details-header">
        <h2 id="modalTitle">Project Details</h2>
        <button id="closeModalBtn" class="close-btn">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
    <div class="container">
        <div class="header">
            <h1 class="title">Portfolio</h1>
            <p class="subtitle">A collection of my digital creations</p>
        </div>

        <div class="gallery-container">
            <!-- Circular gallery will be mounted here -->
            <div id="circularGallery" class="circular-gallery" style="height:600px; position:relative;">
                <!-- items populated by script.js -->
            </div>
        </div>

        <div class="actions">
            <button class="btn" id="viewAllBtn">
                <span>View All Details</span>
                <span>📋</span>
            </button>
        </div>
    </div>

    <div class="theme-toggle" id="themeToggle" aria-label="Toggle theme" role="button" tabindex="0">
        <svg class="lightbulb" viewBox="0 0 24 24">
            <path d="M12 7c-2.76 0-5 2.24-5 5 0 1.64.8 3.09 2.03 4H15c1.2-.91 2-2.36 2-4 0-2.76-2.24-5-5-5zM12 2l3 3-3-3-3 3 3-3zM6.5 6L4 3.5 6.5 6 4 8.5 6.5 6zM18 3.5L15.5 6 18 8.5 15.5 6 18 3.5zM17.5 11.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5 1.5.67 1.5 1.5zM9 16h6v1c0 .55-.45 1-1 1h-4c-.55 0-1-.45-1-1v-1zM10 19h4v1c0 .55-.45 1-1 1h-2c-.55 0-1-.45-1-1v-1z"/>
        </svg>
    </div>

    <div class="details-modal" id="detailsModal" aria-hidden="true">
        <div class="details-content">
            <div class="details-header">
                <h2 class="details-title" id="modalTitle">Project Details</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div id="modalContent">
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
