<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
    <div class="container">
        <div class="header">
            <h1 class="title">Portfolio</h1>
            <p class="subtitle">A collection of my digital creations</p>
        </div>

        <div class="gallery-container">
            <div class="gallery-center">
                <div class="gallery-center-text">My<br>Projects</div>
            </div>
            
            <!-- Sample projects - replace with your actual sites -->
            <div class="site-item" data-site="project1" style="top: 0; left: 50%; transform: translateX(-50%);">
                <div class="site-preview">🚀</div>
                <div class="site-info">
                    <div class="site-title">Landing Page</div>
                </div>
            </div>

            <div class="site-item" data-site="project2" style="top: 25%; right: 0; transform: translateY(-50%);">
                <div class="site-preview">📊</div>
                <div class="site-info">
                    <div class="site-title">Dashboard</div>
                </div>
            </div>

            <div class="site-item" data-site="project3" style="bottom: 0; right: 25%; transform: translateX(50%);">
                <div class="site-preview">🎮</div>
                <div class="site-info">
                    <div class="site-title">Game</div>
                </div>
            </div>

            <div class="site-item" data-site="project4" style="bottom: 0; left: 25%; transform: translateX(-50%);">
                <div class="site-preview">📱</div>
                <div class="site-info">
                    <div class="site-title">Mobile App</div>
                </div>
            </div>

            <div class="site-item" data-site="project5" style="top: 25%; left: 0; transform: translateY(-50%);">
                <div class="site-preview">🎨</div>
                <div class="site-info">
                    <div class="site-title">Art Gallery</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="showAllDetails()">
                <span>View All Details</span>
                <span>📋</span>
            </button>
        </div>
    </div>

    <div class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" role="button" tabindex="0">
        <svg class="lightbulb" viewBox="0 0 24 24">
            <path d="M12 7c-2.76 0-5 2.24-5 5 0 1.64.8 3.09 2.03 4H15c1.2-.91 2-2.36 2-4 0-2.76-2.24-5-5-5zM12 2l3 3-3-3-3 3 3-3zM6.5 6L4 3.5 6.5 6 4 8.5 6.5 6zM18 3.5L15.5 6 18 8.5 15.5 6 18 3.5zM17.5 11.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5 1.5.67 1.5 1.5zM9 16h6v1c0 .55-.45 1-1 1h-4c-.55 0-1-.45-1-1v-1zM10 19h4v1c0 .55-.45 1-1 1h-2c-.55 0-1-.45-1-1v-1z"/>
        </svg>
    </div>

    <div class="details-modal" id="detailsModal" aria-hidden="true">
        <div class="details-content">
            <div class="details-header">
                <h2 class="details-title" id="modalTitle">Project Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent">
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
